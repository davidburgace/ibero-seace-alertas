<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Oportunidades Seleccionadas — Radar Ibero</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0a0d14; --surface:#111520; --surface2:#161b28;
    --border:rgba(255,255,255,0.07); --border2:rgba(255,255,255,0.12);
    --text:#e8eaf0; --muted:#7a8099;
    --accent:#4f7dff; --accent2:#7c5cfc; --green:#22d3a0; --red:#f05252;
    --font-display:'Syne',sans-serif; --font-body:'DM Sans',sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{ font-family:var(--font-body); background:var(--bg); color:var(--text); min-height:100vh; font-size:14px; line-height:1.55; }
  .topbar{
    display:flex; align-items:center; justify-content:space-between; gap:12px;
    padding:14px 24px; border-bottom:1px solid var(--border); background:var(--surface);
    position:sticky; top:0; z-index:50; backdrop-filter:blur(12px);
  }
  .logo{ display:flex; align-items:center; gap:10px; font-family:var(--font-display); font-size:16px; font-weight:700; color:var(--text); text-decoration:none; }
  .logo-dot{ width:8px;height:8px;border-radius:50%;background:var(--accent);box-shadow:0 0 10px var(--accent); }
  .back{ color:var(--muted); text-decoration:none; font-size:13px; border:1px solid var(--border2); border-radius:8px; padding:7px 14px; white-space:nowrap; }
  .back:hover{ color:var(--text); border-color:var(--accent); }
  .wrap{ padding:24px 18px; max-width:1680px; margin:0 auto; }
  h1{ font-family:var(--font-display); font-weight:800; font-size:26px; letter-spacing:-0.01em; margin-bottom:4px; }
  .sub{ color:var(--muted); font-size:13px; margin-bottom:22px; }
  .count{ color:var(--accent); font-weight:600; }
  .dash{ display:flex; gap:18px; flex-wrap:wrap; margin-bottom:24px; }
  .dash-card{ flex:1; min-width:300px; background:var(--surface); border:1px solid var(--border); border-radius:14px; padding:18px 20px; }
  .dash-title{ font-family:var(--font-display); font-weight:600; font-size:12px; color:var(--muted); text-transform:uppercase; letter-spacing:.05em; margin-bottom:16px; }
  .dash-body{ display:flex; align-items:center; gap:22px; }
  .donut{ width:118px; height:118px; border-radius:50%; position:relative; flex-shrink:0; }
  .donut .hole{ position:absolute; inset:23px; background:var(--surface); border-radius:50%; display:flex; align-items:center; justify-content:center; font-family:var(--font-display); font-weight:800; font-size:20px; }
  .dash-legend{ display:flex; flex-direction:column; gap:8px; font-size:13px; }
  .dash-legend .lg{ display:flex; align-items:center; gap:8px; color:var(--text); }
  .dash-legend .lg i{ width:11px; height:11px; border-radius:3px; flex-shrink:0; }
  .dash-legend .lg span{ color:var(--muted); font-size:12px; }
  .tablewrap{ overflow-x:auto; border:1px solid var(--border); border-radius:14px; }
  table{ width:100%; border-collapse:collapse; min-width:1000px; }
  th{
    text-align:left; font-family:var(--font-display); font-weight:600; font-size:11.5px;
    color:var(--muted); text-transform:uppercase; letter-spacing:.04em; font-size:11px;
    padding:11px 9px; border-bottom:1px solid var(--border2); background:var(--surface);
    position:sticky; top:0; white-space:nowrap;
  }
  td{ padding:9px 9px; border-bottom:1px solid var(--border); vertical-align:top; font-size:12.5px; }
  tbody tr:hover td{ background:var(--surface2); }
  .proc a{ color:var(--accent); text-decoration:none; font-weight:600; white-space:nowrap; }
  .proc a:hover{ text-decoration:underline; }
  .desc{ max-width:180px; color:var(--text); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .pub{ white-space:nowrap; color:var(--muted); font-size:12px; }
  .ent{ max-width:170px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; color:var(--text); font-size:12.5px; }
  select.bien, input.fecha{
    background:var(--surface2); border:1px solid var(--border2); color:var(--text);
    border-radius:7px; padding:5px 7px; font-family:var(--font-body); font-size:12px;
  }
  select.bien:focus, input.fecha:focus{ outline:none; border-color:var(--accent); }
  input.fecha{ width:82px; }
  input.fecha.green{ border-color:rgba(34,211,160,.55); background:rgba(34,211,160,.12); }
  input.fecha.yellow{ border-color:rgba(245,166,35,.6); background:rgba(245,166,35,.14); }
  input.fecha.red{ border-color:rgba(240,82,82,.7); background:rgba(240,82,82,.16); color:#ffdada; }
  input.fecha.past{ border-color:var(--border2); color:var(--muted); opacity:.55; }
  .legend{ display:flex; gap:18px; flex-wrap:wrap; font-size:12px; color:var(--muted); margin:-8px 0 20px; }
  .legend span{ display:inline-flex; align-items:center; gap:6px; }
  .legend i{ width:10px; height:10px; border-radius:50%; display:inline-block; }
  .rm{ background:transparent; border:1px solid var(--border2); color:var(--muted); border-radius:7px; padding:6px 10px; cursor:pointer; font-size:12px; white-space:nowrap; }
  .rm:hover{ color:var(--red); border-color:var(--red); }
  tbody tr.won td{ background:rgba(34,211,160,.09); }
  tbody tr.won td.proc{ box-shadow:inset 3px 0 0 var(--green); }
  tbody tr.lost td{ opacity:.4; }
  tbody tr.lost:hover td{ opacity:.72; }
  .res{ display:flex; flex-direction:column; gap:5px; }
  .res label{ display:flex; align-items:center; gap:6px; font-size:12px; color:var(--muted); cursor:pointer; white-space:nowrap; }
  .res input{ accent-color:var(--green); }
  .res label.perdida input{ accent-color:var(--red); }
  .empty{ text-align:center; color:var(--muted); padding:64px 20px; }
  .empty .big{ font-size:42px; margin-bottom:14px; }
  .loading{ text-align:center; color:var(--muted); padding:50px; }
  .toast{
    position:fixed; bottom:24px; left:50%; transform:translateX(-50%);
    background:var(--surface2); border:1px solid var(--border2); color:var(--text);
    padding:10px 18px; border-radius:10px; font-size:13px; opacity:0; transition:opacity .2s; pointer-events:none;
  }
  .toast.show{ opacity:1; }
  @media(max-width:600px){ .wrap{ padding:20px 14px; } .topbar{ padding:12px 16px; } }
</style>
</head>
<body>
  <div class="topbar">
    <a class="logo" href="/"><span class="logo-dot"></span> Radar Ibero</a>
    <a class="back" href="/">← Inicio</a>
  </div>

  <div class="wrap">
    <h1>Oportunidades Seleccionadas</h1>
    <div class="sub">Procesos marcados de interés, con su cronograma. El detalle de bien y las fechas son editables. <span class="count" id="count"></span></div>
    <div class="dash" id="dash" style="display:none">
      <div class="dash-card">
        <div class="dash-title">Resultado de licitaciones</div>
        <div class="dash-body">
          <div class="donut" id="donutRes"><div class="hole" id="holeRes"></div></div>
          <div class="dash-legend" id="legendRes"></div>
        </div>
      </div>
      <div class="dash-card">
        <div class="dash-title">Por tipo de bien</div>
        <div class="dash-body">
          <div class="donut" id="donutBien"><div class="hole" id="holeBien"></div></div>
          <div class="dash-legend" id="legendBien"></div>
        </div>
      </div>
    </div>
    <div class="legend">
      <span><i style="background:#22d3a0"></i> Más de 2 días</span>
      <span><i style="background:#f5a623"></i> Faltan 2 días</span>
      <span><i style="background:#f05252"></i> 1 día o menos</span>
      <span><i style="background:#3a3f4d"></i> Ya pasó</span>
    </div>
    <div id="container"><div class="loading">Cargando…</div></div>
  </div>

  <div class="toast" id="toast"></div>

<script>
  const $ = s => document.querySelector(s);
  const BIENES = ['Educación','Hospitalario','Metalmecánica','Oficina','General'];
  let DATA = [];

  function toast(msg){ const t=$('#toast'); t.textContent=msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),1700); }
  function esc(s){ return (s==null?'':String(s)).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
  function fmtISO(v){ if(!v) return ''; const m=String(v).match(/^(\d{4})-(\d{2})-(\d{2})/); return m ? m[3]+'/'+m[2]+'/'+m[1] : v; }

  function daysUntil(v){
    if(!v) return null;
    const m = String(v).trim().match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})/);
    if(!m) return null;
    const d = new Date(+m[3], +m[2]-1, +m[1]); d.setHours(0,0,0,0);
    const t = new Date(); t.setHours(0,0,0,0);
    return Math.round((d - t) / 86400000);
  }
  function fechaColor(v){
    const d = daysUntil(v);
    if(d===null) return '';
    if(d < 0) return 'past';
    if(d <= 1) return 'red';
    if(d <= 2) return 'yellow';
    return 'green';
  }
  function applyDateColor(el){
    el.classList.remove('green','yellow','red','past');
    const c = fechaColor(el.value); if(c) el.classList.add(c);
  }
  async function onDateBlur(id, field, el){
    await saveField(id, field, el.value);
    applyDateColor(el);
  }

  function donut(segs){
    const total = segs.reduce((s,x)=>s+x.value,0);
    if(!total) return { gradient:'var(--surface2)', legend:'<div class="lg" style="color:var(--muted)">Sin datos aún</div>' };
    let acc=0; const stops=[];
    segs.forEach(s=>{ if(s.value<=0) return; const a=acc/total*100, b=(acc+s.value)/total*100; stops.push(s.color+' '+a+'% '+b+'%'); acc+=s.value; });
    const legend = segs.filter(s=>s.value>0).map(s=>'<div class="lg"><i style="background:'+s.color+'"></i> '+esc(s.label)+' <b>'+Math.round(s.value/total*100)+'%</b> <span>('+s.value+')</span></div>').join('');
    return { gradient:'conic-gradient('+stops.join(',')+')', legend };
  }
  function renderDashboard(){
    const dash = $('#dash');
    if(!DATA.length){ dash.style.display='none'; return; }
    dash.style.display='flex';
    const g = DATA.filter(o=>o.resultado==='ganada').length;
    const p = DATA.filter(o=>o.resultado==='perdida').length;
    const en = DATA.length - g - p;
    const d1 = donut([
      {label:'Ganadas', value:g, color:'#22d3a0'},
      {label:'Perdidas', value:p, color:'#f05252'},
      {label:'En juego', value:en, color:'#3a3f4d'}
    ]);
    $('#donutRes').style.background = d1.gradient;
    $('#legendRes').innerHTML = d1.legend;
    const res = g+p;
    $('#holeRes').textContent = res ? Math.round(g/res*100)+'%' : '—';
    $('#holeRes').style.color = '#22d3a0';
    const bienColors = {'Educación':'#4f7dff','Hospitalario':'#22d3a0','Metalmecánica':'#f5a623','Oficina':'#7c5cfc','General':'#6b7280'};
    const counts = {};
    DATA.forEach(o=>{ const b=(o.detalle_bien||'General'); counts[b]=(counts[b]||0)+1; });
    const segs = Object.keys(counts).map(b=>({label:b, value:counts[b], color:bienColors[b]||'#9aa0b4'}));
    const d2 = donut(segs);
    $('#donutBien').style.background = d2.gradient;
    $('#legendBien').innerHTML = d2.legend;
    $('#holeBien').textContent = DATA.length;
    $('#holeBien').style.color = 'var(--text)';
  }

  async function load(){
    try{
      const res = await fetch('/api/interes');
      DATA = await res.json();
      render();
    }catch(e){ $('#container').innerHTML = '<div class="empty">Error al cargar: '+esc(e.message)+'</div>'; }
  }

  function render(){
    $('#count').textContent = DATA.length ? '('+DATA.length+')' : '';
    renderDashboard();
    if(!DATA.length){
      $('#container').innerHTML = '<div class="empty"><div class="big">⭐</div>Aún no hay oportunidades seleccionadas.<br>Abre una oportunidad y marca 👍 para verla aquí.</div>';
      return;
    }
    const rows = DATA.map(o=>{
      let opts = BIENES.map(b=>'<option '+(o.detalle_bien===b?'selected':'')+'>'+b+'</option>').join('');
      if(o.detalle_bien && !BIENES.includes(o.detalle_bien)) opts = '<option selected>'+esc(o.detalle_bien)+'</option>'+opts;
      const rcls = o.resultado==='ganada' ? 'won' : (o.resultado==='perdida' ? 'lost' : '');
      return '<tr class="'+rcls+'" data-id="'+o.id+'">'
        + '<td class="pub">'+esc(fmtISO(o.published_date))+'</td>'
        + '<td class="proc"><a href="oportunidad.html?id='+o.id+'">'+esc(o.nomenclature||o.external_id||'—')+'</a></td>'
        + '<td class="ent" title="'+esc(o.entity||'')+'">'+esc(o.entity||'—')+'</td>'
        + '<td class="desc" title="'+esc(o.title||'')+'">'+esc(o.title||'—')+'</td>'
        + '<td><select class="bien" onchange="saveField(\''+o.id+'\',\'detalle_bien\',this.value)">'+opts+'</select></td>'
        + '<td><input class="fecha '+fechaColor(o.fecha_consultas)+'" value="'+esc(o.fecha_consultas||'')+'" onblur="onDateBlur(\''+o.id+'\',\'fecha_consultas\',this)"></td>'
        + '<td><input class="fecha '+fechaColor(o.fecha_bases_integradas)+'" value="'+esc(o.fecha_bases_integradas||'')+'" onblur="onDateBlur(\''+o.id+'\',\'fecha_bases_integradas\',this)"></td>'
        + '<td><input class="fecha '+fechaColor(o.fecha_presentacion)+'" value="'+esc(o.fecha_presentacion||'')+'" onblur="onDateBlur(\''+o.id+'\',\'fecha_presentacion\',this)"></td>'
        + '<td><input class="fecha '+fechaColor(o.fecha_buena_pro)+'" value="'+esc(o.fecha_buena_pro||'')+'" onblur="onDateBlur(\''+o.id+'\',\'fecha_buena_pro\',this)"></td>'
        + '<td><div class="res">'
        +   '<label><input type="checkbox" '+(o.resultado==='ganada'?'checked':'')+' onchange="setResultado(\''+o.id+'\',\'ganada\',this.checked)"> Ganada</label>'
        +   '<label class="perdida"><input type="checkbox" '+(o.resultado==='perdida'?'checked':'')+' onchange="setResultado(\''+o.id+'\',\'perdida\',this.checked)"> Perdida</label>'
        + '</div></td>'
        + '<td><button class="rm" onclick="quitar(\''+o.id+'\')">✕ Quitar</button></td>'
        + '</tr>';
    }).join('');
    $('#container').innerHTML = '<div class="tablewrap"><table>'
      + '<thead><tr>'
      + '<th>Publicación</th><th>Nº de proceso</th><th>Entidad</th><th>Descripción</th><th>Detalle de bien</th>'
      + '<th>Consultas</th><th>Bases integradas</th>'
      + '<th>Presentación</th><th>Buena pro</th><th>Resultado</th><th></th>'
      + '</tr></thead><tbody>'+rows+'</tbody></table></div>';
  }

  async function saveField(id, field, value){
    try{
      await fetch('/api/opportunities/'+id+'/tracker', {
        method:'PUT', headers:{'Content-Type':'application/json'}, body:JSON.stringify({[field]:value})
      });
      const o = DATA.find(x=>String(x.id)===String(id)); if(o) o[field]=value;
      toast('Guardado');
    }catch(e){ toast('No se pudo guardar'); }
  }

  async function setResultado(id, val, checked){
    const o = DATA.find(x=>String(x.id)===String(id)); if(!o) return;
    o.resultado = checked ? val : null;
    render();
    try{
      await fetch('/api/opportunities/'+id+'/tracker', {
        method:'PUT', headers:{'Content-Type':'application/json'}, body:JSON.stringify({ resultado: o.resultado })
      });
      toast(o.resultado==='ganada' ? '✓ Ganada' : (o.resultado==='perdida' ? 'Marcada como perdida' : 'Sin resultado'));
    }catch(e){ toast('No se pudo guardar'); }
  }

  async function quitar(id){
    if(!confirm('¿Quitar esta oportunidad de las seleccionadas?')) return;
    try{
      await fetch('/api/opportunities/'+id+'/interes', {
        method:'PUT', headers:{'Content-Type':'application/json'}, body:JSON.stringify({interes:'no'})
      });
      DATA = DATA.filter(x=>String(x.id)!==String(id));
      render(); toast('Quitada');
    }catch(e){ toast('No se pudo quitar'); }
  }

  load();
</script>
</body>
</html>
