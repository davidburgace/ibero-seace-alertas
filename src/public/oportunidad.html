<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Radar Ibero - Oportunidad</title>

<style>
body{
    font-family:Arial,sans-serif;
    margin:0;
    padding:20px;
    background:#f5f7fa;
}

.card{
    background:white;
    border-radius:12px;
    padding:20px;
    margin-bottom:20px;
    box-shadow:0 2px 8px rgba(0,0,0,.08);
}

h1{
    margin-top:0;
}

.score{
    font-size:32px;
    font-weight:bold;
    color:#0d6efd;
}

textarea{
    width:100%;
    height:100px;
    padding:10px;
}

button{
    padding:10px 16px;
    border:none;
    border-radius:6px;
    cursor:pointer;
    background:#0d6efd;
    color:white;
}

#answer{
    margin-top:15px;
    white-space:pre-wrap;
}
</style>
</head>

<body>

<div class="card">
    <h1 id="title">Cargando...</h1>

    <p><b>Entidad:</b> <span id="entity"></span></p>

    <p><b>Región:</b> <span id="region"></span></p>

    <p><b>Línea:</b> <span id="line"></span></p>

    <p><b>Proceso:</b> <span id="process"></span></p>

    <button onclick="copyProcess()">
        Copiar Proceso Activo
    </button>
</div>

<div class="card">

    <h2>🤖 Análisis IA</h2>

    <div class="score" id="score">--</div>

    <p id="summary"></p>

    <p id="recommendation"></p>

</div>

<div class="card">

    <h2>💬 Preguntar a la IA</h2>

    <textarea
      id="question"
      placeholder="Ejemplo: ¿Conviene participar?"
    ></textarea>

    <br><br>

    <button onclick="askAI()">
        Consultar
    </button>

    <div id="answer"></div>

</div>

<script>
function copyProcess(){
    navigator.clipboard.writeText(
        document.getElementById('process').innerText
    );
    alert('Proceso copiado');
}
</script>

</body>
</html>
