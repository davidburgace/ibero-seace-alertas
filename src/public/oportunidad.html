<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Radar Ibero - Oportunidad</title>

<style>
body{
    font-family:Arial,sans-serif;
    margin:0;
    padding:20px;
    background:#f5f7fa;
}

.card{
    background:white;
    border-radius:12px;
    padding:20px;
    margin-bottom:20px;
    box-shadow:0 2px 8px rgba(0,0,0,.08);
}

h1{
    margin-top:0;
}

.score{
    font-size:32px;
    font-weight:bold;
    color:#0d6efd;
}

textarea{
    width:100%;
    height:100px;
    padding:10px;
}

button{
    padding:10px 16px;
    border:none;
    border-radius:6px;
    cursor:pointer;
    background:#0d6efd;
    color:white;
}

#answer{
    margin-top:15px;
    white-space:pre-wrap;
}
</style>
</head>

<body>

<div class="card">
    <h1 id="title">Cargando...</h1>

    <p><b>Entidad:</b> <span id="entity"></span></p>

    <p><b>Región:</b> <span id="region"></span></p>

    <p><b>Línea:</b> <span id="line"></span></p>

    <p><b>Proceso:</b> <span id="process"></span></p>

    <button onclick="copyProcess()">
        Copiar Proceso Activo
    </button>
</div>

<div class="card">

    <h2>🤖 Análisis IA</h2>

    <div id="scoreBox">
    <div id="score" style="font-size:32px;font-weight:bold;"></div>

    <div style="background:#e5e7eb;border-radius:8px;height:18px;margin-top:8px;">
        <div id="scoreBar"
             style="height:18px;width:0%;border-radius:8px;background:#f59e0b;">
        </div>
    </div>

    <div id="decisionBadge"
     style="
        margin-top:12px;
        padding:12px;
        border-radius:10px;
        font-size:22px;
        font-weight:bold;
        text-align:center;
        color:white;
     ">
</div>
</div>

    <p id="summary"></p>

    <p id="recommendation"></p>
    <h3>📊 Criterios de puntuación</h3>

<div id="criteriaCards"></div>
    <h3>⚠️ Riesgos</h3>
<ul id="risks"></ul>

<h3>✅ Acciones recomendadas</h3>
<ul id="actions"></ul>

</div>

<div class="card">

    <h2>💬 Preguntar a la IA</h2>

    <textarea
      id="question"
      placeholder="Ejemplo: ¿Conviene participar?"
    ></textarea>

    <br><br>

    <button onclick="askAI()">
        Consultar
    </button>

    <div id="answer"></div>

</div>

<script>
const params = new URLSearchParams(window.location.search);
const id = params.get('id');
let opportunity = null;

async function loadOpportunity(){
  try{
    const res = await fetch('/api/opportunities/' + id);
    const data = await res.json();

    if(!data.ok){
      document.getElementById('title').innerText = 'Oportunidad no encontrada';
      return;
    }

    opportunity = data.opportunity;
    console.log(opportunity);

    document.getElementById('title').innerText = opportunity.title || 'Oportunidad SEACE';
    document.getElementById('entity').innerText = opportunity.entity || '-';
    document.getElementById('region').innerText = opportunity.region || '-';
    document.getElementById('line').innerText = opportunity.business_line || '-';
    document.getElementById('process').innerText = opportunity.external_id || opportunity.nomenclature || '-';
    const score =
Number(opportunity.ai_score || opportunity.puntuacion_ai || 0);

    document.getElementById('score').innerText =
    score + ' puntos / 100';
    
document.getElementById('scoreBar').style.width =
score + '%';

let color = '#ef4444';
let texto = '🔴 NO PARTICIPAR';

if(score >= 80){
    color = '#22c55e';
    texto = '🟢 PARTICIPAR';
}
else if(score >= 60){
    color = '#f59e0b';
    texto = '🟡 REVISAR';
}

document.getElementById('scoreBar').style.background =
color;

document.getElementById('decisionBadge').innerText =
texto;

document.getElementById('decisionBadge').style.background =
color;

document.getElementById('decisionBadge').style.color =
'white';  
    document.getElementById('summary').innerText = opportunity.ai_summary || opportunity.resumen_ai || 'Análisis pendiente';
    document.getElementById('recommendation').innerText = opportunity.ai_recommendation || opportunity.recomendacion_ai || '';

    const criteria =
Array.isArray(opportunity.ai_criteria)
  ? opportunity.ai_criteria
  : Array.isArray(opportunity.criteria)
    ? opportunity.criteria
    : [];

const criteriaCards =
document.getElementById('criteriaCards');

if(criteriaCards){

    criteriaCards.innerHTML =
    criteria.map(c => {

        const pct =
        Math.round((c.score / c.max) * 100);

        return `
        <div style="
            margin-bottom:14px;
            padding:10px;
            border:1px solid #e5e7eb;
            border-radius:8px;
            background:#fafafa;
        ">
            <div style="
                display:flex;
                justify-content:space-between;
                margin-bottom:6px;
                font-weight:bold;
            ">
                <span>${c.name}</span>
                <span>${c.score}/${c.max}</span>
            </div>

            <div style="
                background:#e5e7eb;
                height:12px;
                border-radius:6px;
            ">
                <div style="
                    width:${pct}%;
                    height:12px;
                    background:#22c55e;
                    border-radius:6px;
                ">
                </div>
            </div>
        </div>
        `;
    }).join('');
}

    const risks = Array.isArray(opportunity.ai_risks)
  ? opportunity.ai_risks
  : Array.isArray(opportunity.risks)
    ? opportunity.risks
    : [];

const actions = Array.isArray(opportunity.ai_actions)
  ? opportunity.ai_actions
  : Array.isArray(opportunity.actions)
    ? opportunity.actions
    : [];

document.getElementById('risks').innerHTML =
  risks.length
    ? risks.map(r =>  `<li>${r}</li>`).join('')
    : '<li>Pendiente</li>';

document.getElementById('actions').innerHTML =
  actions.length
    ? actions.map(a =>  `<li>${a}</li>`).join('')
    : '<li>Pendiente</li>'

  }catch(e){
    document.getElementById('title').innerText = 'Error cargando oportunidad';
  }
}

function copyProcess(){
  navigator.clipboard.writeText(document.getElementById('process').innerText);
  alert('Proceso copiado');
}

async function askAI(){
  const question = document.getElementById('question').value;
  const answerDiv = document.getElementById('answer');

  answerDiv.innerText = 'Consultando IA...';

  const res = await fetch('/api/opportunities/' + id + '/ask', {
    method:'POST',
    headers:{ 'Content-Type':'application/json' },
    body: JSON.stringify({ question })
  });

  const data = await res.json();
  answerDiv.innerText = data.answer || data.error || 'No se obtuvo respuesta';
}

loadOpportunity();
</script>

</body>
</html>
